<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>形音鬥士｜歷屆基測會考字形字音挑戰</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <h1>形音鬥士</h1>
  <p class="subtitle">歷屆基測會考字形字音總複習</p>
</header>

<main id="app">

  <section id="view-home" class="view">
    <div class="paper-note">資料來源：歷屆基測（90～102）／會考（103～）官方試題教師版整理，共 <span id="stat-total">427</span> 題原始題目。</div>
    <div class="mode-grid">
      <button class="mode-card" data-mode="xingxing">
        <span class="mode-icon">形</span>
        <span class="mode-title">字形挑戰</span>
        <span class="mode-desc">錯別字辨正</span>
      </button>
      <button class="mode-card" data-mode="yinyin">
        <span class="mode-icon">音</span>
        <span class="mode-title">字音挑戰</span>
        <span class="mode-desc">破音字注音</span>
      </button>
      <button class="mode-card" data-mode="mix">
        <span class="mode-icon">混</span>
        <span class="mode-title">混合模式</span>
        <span class="mode-desc">字形＋字音</span>
      </button>
      <button class="mode-card" data-mode="wrongbook">
        <span class="mode-icon">錯</span>
        <span class="mode-title">錯題本複習</span>
        <span class="mode-desc" id="wrongbook-count">目前 0 題待複習</span>
      </button>
      <button class="mode-card" data-mode="battle">
        <span class="mode-icon">戰</span>
        <span class="mode-title">考官對戰</span>
        <span class="mode-desc">PvE 闖關</span>
      </button>
      <button class="mode-card" data-mode="dex">
        <span class="mode-icon">錄</span>
        <span class="mode-title">錯字通緝令</span>
        <span class="mode-desc">字靈圖鑑</span>
      </button>
    </div>
  </section>

  <section id="view-quiz" class="view hidden">
    <div class="quiz-topbar">
      <button class="btn-back" data-action="home">← 返回</button>
      <div class="quiz-progress"><span id="quiz-index">1</span> / <span id="quiz-total">10</span></div>
      <div class="quiz-score">✓ <span id="quiz-score">0</span></div>
    </div>
    <div class="quiz-card" id="quiz-card"></div>
  </section>

  <section id="view-result" class="view hidden">
    <div class="result-card">
      <h2>本回合結束</h2>
      <p id="result-summary"></p>
      <button class="btn-primary" data-action="home">回首頁</button>
      <button class="btn-secondary" data-action="retry">再來一輪</button>
    </div>
  </section>

  <section id="view-battle" class="view hidden">
    <div class="quiz-topbar">
      <button class="btn-back" data-action="home">← 返回</button>
      <div id="battle-title"></div>
    </div>
    <div class="battle-hp-row">
      <div class="hp-block"><span class="hp-label">你</span><div class="hp-bar"><div id="hp-player" class="hp-fill"></div></div></div>
      <div class="hp-block"><span class="hp-label" id="hp-enemy-name">考官</span><div class="hp-bar"><div id="hp-enemy" class="hp-fill enemy"></div></div></div>
    </div>
    <div class="combo-indicator">連擊 <span id="combo-count">0</span></div>
    <div class="quiz-card" id="battle-card"></div>
    <div id="battle-roster" class="roster-grid"></div>
  </section>

  <section id="view-dex" class="view hidden">
    <div class="quiz-topbar">
      <button class="btn-back" data-action="home">← 返回</button>
      <div>錯字通緝令圖鑑</div>
    </div>
    <div id="dex-grid" class="dex-grid"></div>
  </section>

</main>

<script src="js/data.js"></script>
<script src="js/store.js"></script>
<script src="js/quiz.js"></script>
<script src="js/questionui.js"></script>
<script src="js/dex.js"></script>
<script src="js/battle.js"></script>
<script src="js/app.js"></script>
</body>
</html>
